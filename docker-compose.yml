services:
  pygeoapi:
    build: .
    image: pygeoapi-custom
    profiles:
      - default
    ports:
      - "8080:8080"
    volumes:
      - ./pygeoapi-config.yml:/pygeoapi/pygeoapi-config.yml
      - ./pygeoapi-openapi.yml:/pygeoapi/pygeoapi-openapi.yml
      - ./data:/pygeoapi/data
    env_file:
      - .env-docker
    depends_on:
      opensearch:
        condition: service_healthy

  pygeoapi-debug:
    build: .
    profiles:
      - debug
    ports:
      - "8080:8080"
      - "5678:5678"
    volumes:
      - ./pygeoapi-config.yml:/pygeoapi/pygeoapi-config.yml
      - ./pygeoapi-openapi.yml:/pygeoapi/pygeoapi-openapi.yml
      - ./data:/pygeoapi/data
    env_file:
      - .env-docker
    depends_on:
      opensearch:
        condition: service_healthy
    command:
      - python
      - -m
      - debugpy
      - --listen
      - "0.0.0.0:5678"
      - -m
      - uvicorn
      - app:APP
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --app-dir
      - /pygeoapi/pygeoapi-swissgeo-extensions
      - --log-config
      - /pygeoapi/logging-conf.yaml

  opensearch:
    image: opensearchproject/opensearch:3
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - osdata:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  catalogue-loader:
    build: .
    image: pygeoapi-custom
    volumes:
      - ./static-s3:/pygeoapi/static-s3
      - ./scripts:/opt
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
    command: ["python3", "/opt/load-opensearch-catalogue.py"]
    depends_on:
      opensearch:
        condition: service_healthy
    restart: on-failure

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  pgdata:
  osdata:
