        resource_id: geoadmin-services-os
        data: ${OPENSEARCH_URL:-http://localhost:9200}/geoadmin-services
        aws4auth: ${OPENSEARCH_AWS4AUTH:-false}
        id_field: externalId
        time_field: recordCreated
        title_field: title
        languages:
          - en
